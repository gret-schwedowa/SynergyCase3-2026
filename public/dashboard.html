<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - Блог</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        button, .button { background: #007bff; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; margin: 4px; }
        button.danger { background: #dc3545; }
        button.warning { background: #ffc107; color: black; }
        input, textarea, select { width: 100%; padding: 8px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
        .post, .comment { border: 1px solid #ddd; padding: 12px; margin: 12px 0; border-radius: 4px; background: #fafafa; }
        .post h3 { margin: 0 0 8px; }
        .tags { font-size: 0.8em; color: #666; }
        .actions { margin-top: 8px; }
        hr { margin: 20px 0; }
        .nav { background: #333; color: white; padding: 10px; margin-bottom: 20px; display: flex; gap: 16px; }
        .nav a, .nav button { background: none; color: white; border: none; cursor: pointer; text-decoration: underline; }
        .row { display: flex; gap: 20px; }
        .column { flex: 1; }
        @media (max-width: 800px) { .row { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <span>📝 Блог</span>
        <button onclick="logout()">Выйти</button>
    </div>

    <div class="row">
        <!-- Левая колонка: создание поста и мои посты -->
        <div class="column">
            <h2>➕ Создать новый пост</h2>
            <input type="text" id="postTitle" placeholder="Заголовок">
            <textarea id="postContent" rows="4" placeholder="Содержание поста"></textarea>
            <input type="text" id="postTags" placeholder="Теги (через запятую, например: спорт, IT, жизнь)">
            <select id="postVisibility">
                <option value="public">🌍 Публичный</option>
                <option value="private">🔒 Приватный (только я)</option>
                <option value="request-only">🔐 Только по запросу</option>
            </select>
            <button onclick="createPost()">Опубликовать</button>
            <hr>

            <h2>📌 Мои посты</h2>
            <div id="myPosts">Загрузка...</div>
        </div>

        <!-- Правая колонка: лента, публичные посты, теги, комментарии -->
        <div class="column">
            <h2>🔥 Лента подписок</h2>
            <div id="feed">Загрузка...</div>

            <h2>🌐 Все публичные посты</h2>
            <input type="text" id="globalTagFilter" placeholder="Фильтр по тегу (например: python)">
            <button onclick="filterGlobalByTag()">Применить тег</button>
            <div id="publicPosts">Загрузка...</div>

            <h2>🏷️ Поиск по тегам</h2>
            <input type="text" id="tagSearch" placeholder="Введите тег">
            <button onclick="searchByTag()">Найти по тегу</button>
            <div id="taggedPosts"></div>
        </div>
    </div>

    <!-- Отдельно: комментарии (будут появляться под выбранным постом) -->
    <div id="commentsModal" style="display:none; border-top: 2px solid #ccc; margin-top: 20px;">
        <h3>💬 Комментарии</h3>
        <div id="commentsList"></div>
        <textarea id="commentText" rows="2" placeholder="Ваш комментарий..."></textarea>
        <button onclick="submitComment()">Добавить комментарий</button>
        <button onclick="closeComments()">Закрыть</button>
    </div>
    <!-- Модальное окно редактирования -->
<div id="editModal" style="display:none; position:fixed; top:30%; left:25%; width:50%; background:white; padding:20px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.3); z-index:1000;">
    <h3>Редактировать пост</h3>
    <input type="text" id="editTitle" placeholder="Заголовок" style="width:100%">
    <textarea id="editContent" rows="5" style="width:100%"></textarea>
    <button onclick="saveEditedPost()">Сохранить</button>
    <button onclick="closeEditModal()">Отмена</button>
</div>
</div>

<script>
    const API = '';
    let token = localStorage.getItem('token');
    let currentPostId = null;

    if (!token) {
        alert('Вы не авторизованы. Перенаправление на главную.');
        window.location.href = 'index.html';
    }

    // Helper для fetch с авторизацией
    async function authFetch(url, options = {}) {
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': token,
            ...options.headers
        };
        const res = await fetch(API + url, { ...options, headers });
        if (res.status === 401) {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        return res;
    }

    // Создание поста
    async function createPost() {
        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postContent').value;
        const tagsRaw = document.getElementById('postTags').value;
        const tags = tagsRaw.split(',').map(t => t.trim()).filter(t => t);
        const visibility = document.getElementById('postVisibility').value;

        const res = await authFetch('/api/posts', {
            method: 'POST',
            body: JSON.stringify({ title, content, tags, visibility })
        });
        if (res.ok) {
            alert('Пост создан');
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('postTags').value = '';
            loadMyPosts();
            loadPublicPosts();
            loadFeed();
        } else {
            const err = await res.json();
            alert('Ошибка: ' + (err.error || 'неизвестная'));
        }
    }

    // Загрузка моих постов
    async function loadMyPosts() {
        const res = await authFetch('/api/posts/my');
        const posts = await res.json();
        const container = document.getElementById('myPosts');
        if (!posts.length) { container.innerHTML = '<p>Нет постов</p>'; return; }
        container.innerHTML = posts.map(post => `
            <div class="post">
                <h3>${escapeHtml(post.title)}</h3>
                <p>${escapeHtml(post.content.substring(0, 150))}...</p>
                <div class="tags">🏷️ ${(post.tags || []).join(', ') || 'без тегов'} | 👁️ ${post.visibility}</div>
                <div class="actions">
                    <button class="warning" onclick="editPost('${post._id}')">✏️ Редактировать</button>
                    <button class="danger" onclick="deletePost('${post._id}')">🗑️ Удалить</button>
                    <button onclick="showComments('${post._id}')">💬 Комментарии</button>
                </div>
            </div>
        `).join('');
    }

    // Редактирование (упрощённо: через prompt)
    async function editPost(postId) {
        const newTitle = prompt('Новый заголовок:');
        const newContent = prompt('Новый текст:');
        if (!newTitle && !newContent) return;
        const res = await authFetch(`/api/posts/${postId}`, {
            method: 'PUT',
            body: JSON.stringify({ title: newTitle, content: newContent })
        });
        if (res.ok) {
            alert('Пост обновлён');
            loadMyPosts();
            loadPublicPosts();
            loadFeed();
        } else {
            alert('Ошибка при редактировании');
        }
    }

    async function deletePost(postId) {
        if (!confirm('Удалить пост навсегда?')) return;
        const res = await authFetch(`/api/posts/${postId}`, { method: 'DELETE' });
        if (res.ok) {
            alert('Удалено');
            loadMyPosts();
            loadPublicPosts();
            loadFeed();
        } else {
            alert('Ошибка удаления');
        }
    }

    // Лента подписок
    async function loadFeed() {
        const res = await authFetch('/api/posts/feed');
        const posts = await res.json();
        const container = document.getElementById('feed');
        if (!posts.length) { container.innerHTML = '<p>Подпишитесь на кого-нибудь, чтобы видеть посты.</p>'; return; }
        container.innerHTML = posts.map(post => `
            <div class="post">
                <h3>${escapeHtml(post.title)}</h3>
                <p><strong>${escapeHtml(post.author?.username || 'unknown')}</strong></p>
                <p>${escapeHtml(post.content.substring(0, 200))}</p>
                <div class="tags">🏷️ ${(post.tags || []).join(', ')}</div>
                <button onclick="showComments('${post._id}')">💬 Комментарии</button>
            </div>
        `).join('');
    }

    // Все публичные посты + фильтр по тегу (глобальный)
    let globalTag = '';
    async function loadPublicPosts() {
        let url = '/api/posts/public';
        if (globalTag) url = `/api/posts/tags/${encodeURIComponent(globalTag)}`;
        const res = await fetch(url);
        const posts = await res.json();
        const container = document.getElementById('publicPosts');
        if (!posts.length) { container.innerHTML = '<p>Нет публичных постов</p>'; return; }
        container.innerHTML = posts.map(post => `
            <div class="post">
                <h3>${escapeHtml(post.title)}</h3>
                <p><strong>${escapeHtml(post.author?.username || 'anon')}</strong></p>
                <p>${escapeHtml(post.content.substring(0, 200))}</p>
                <div class="tags">🏷️ ${(post.tags || []).join(', ')}</div>
                <button onclick="subscribeTo('${post.author?._id}')">➕ Подписаться</button>
                <button onclick="showComments('${post._id}')">💬 Комментарии</button>
            </div>
        `).join('');
    }

    function filterGlobalByTag() {
        globalTag = document.getElementById('globalTagFilter').value.trim();
        loadPublicPosts();
    }

    async function searchByTag() {
        const tag = document.getElementById('tagSearch').value.trim();
        if (!tag) return;
        const res = await fetch(`/api/posts/tags/${encodeURIComponent(tag)}`);
        const posts = await res.json();
        const container = document.getElementById('taggedPosts');
        if (!posts.length) { container.innerHTML = '<p>Постов с таким тегом нет</p>'; return; }
        container.innerHTML = posts.map(post => `
            <div class="post">
                <h3>${escapeHtml(post.title)}</h3>
                <p>${escapeHtml(post.content.substring(0, 150))}</p>
                <div class="tags">🏷️ ${(post.tags || []).join(', ')}</div>
            </div>
        `).join('');
    }

    // Подписка
    async function subscribeTo(userId) {
        if (!userId) return;
        const res = await authFetch(`/api/subscribe/${userId}`, { method: 'POST' });
        if (res.ok) alert('Подписка оформлена');
        else alert('Ошибка подписки (возможно, уже подписаны)');
    }

    // Комментарии
    async function showComments(postId) {
        currentPostId = postId;
        const modal = document.getElementById('commentsModal');
        modal.style.display = 'block';
        const res = await fetch(`/api/comments/${postId}`);
        const comments = await res.json();
        const container = document.getElementById('commentsList');
        if (!comments.length) container.innerHTML = '<p>Нет комментариев. Будьте первым!</p>';
        else container.innerHTML = comments.map(c => `
            <div class="comment"><strong>${escapeHtml(c.author?.username || 'user')}</strong>: ${escapeHtml(c.text)}</div>
        `).join('');
    }

    async function submitComment() {
        const text = document.getElementById('commentText').value;
        if (!text) return alert('Введите текст');
        const res = await authFetch(`/api/comments/${currentPostId}`, {
            method: 'POST',
            body: JSON.stringify({ text })
        });
        if (res.ok) {
            alert('Комментарий добавлен');
            document.getElementById('commentText').value = '';
            showComments(currentPostId);
        } else {
            alert('Ошибка отправки комментария');
        }
    }

    function closeComments() {
        document.getElementById('commentsModal').style.display = 'none';
        currentPostId = null;
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Добавим недостающий маршрут /api/posts/my
    // ВАЖНО: в файл routes/posts.js нужно добавить этот маршрут (см. дополнение ниже)
    async function loadAdditional() {
        await loadMyPosts();
        await loadFeed();
        await loadPublicPosts();
    }
    
    loadAdditional();
</script>
</body>
</html>
