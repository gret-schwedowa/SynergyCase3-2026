<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1, h2 { margin-bottom: 16px; color: #1a1a2e; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; }
        button:hover { opacity: 0.9; }
        button.danger { background: #dc3545; }
        button.warning { background: #ffc107; color: #000; }
        .post { border: 1px solid #e0e0e0; padding: 16px; margin: 16px 0; border-radius: 8px; background: #fafafa; }
        .post h3 { margin-bottom: 8px; color: #007bff; }
        .tags { font-size: 12px; color: #666; margin: 8px 0; }
        .row { display: flex; gap: 20px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 300px; }
        .nav { background: #1a1a2e; color: white; padding: 15px; margin-bottom: 20px; border-radius: 8px; display: flex; justify-content: space-between; }
        .nav a, .nav button { background: none; border: none; color: white; cursor: pointer; text-decoration: underline; margin: 0 10px; }
        .modal { display: none; position: fixed; top: 30%; left: 25%; width: 50%; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 1000; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        @media (max-width: 768px) { .modal { width: 90%; left: 5%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <span>📝 Блог на PHP</span>
        <div id="navAuth">
            <span id="navUsername"></span>
            <button onclick="logout()">Выйти</button>
        </div>
    </div>

    <div id="authSection" class="card">
        <h2>Регистрация</h2>
        <input type="text" id="regUsername" placeholder="Имя пользователя">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Пароль">
        <button onclick="register()">Зарегистрироваться</button>
        
        <h2>Вход</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button onclick="login()">Войти</button>
    </div>

    <div id="dashboardSection" style="display:none;">
        <div class="row">
            <div class="col">
                <div class="card">
                    <h2>➕ Создать пост</h2>
                    <input type="text" id="postTitle" placeholder="Заголовок">
                    <textarea id="postContent" rows="5" placeholder="Содержание"></textarea>
                    <input type="text" id="postTags" placeholder="Теги (через запятую)">
                    <select id="postVisibility">
                        <option value="public">🌍 Публичный</option>
                        <option value="private">🔒 Приватный</option>
                        <option value="request_only">🔐 Только по запросу</option>
                    </select>
                    <button onclick="createPost()">Опубликовать</button>
                </div>

                <div class="card">
                    <h2>📌 Мои посты</h2>
                    <div id="myPosts">Загрузка...</div>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <h2>🔥 Лента подписок</h2>
                    <div id="feed">Загрузка...</div>
                </div>

                <div class="card">
                    <h2>🌐 Публичные посты</h2>
                    <input type="text" id="tagFilter" placeholder="Фильтр по тегу">
                    <button onclick="filterByTag()">Применить</button>
                    <div id="publicPosts">Загрузка...</div>
                </div>

                <div class="card">
                    <h2>🔐 Посты "только по запросу" (доступные)</h2>
                    <div id="requestPosts">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <h3>Редактировать пост</h3>
    <input type="text" id="editTitle" placeholder="Заголовок">
    <textarea id="editContent" rows="5" placeholder="Содержание"></textarea>
    <button onclick="saveEdit()">Сохранить</button>
    <button onclick="closeEditModal()">Отмена</button>
</div>
<div id="overlay" class="overlay"></div>

<script>
let token = localStorage.getItem('token');
let currentEditId = null;
const API = 'api.php?route=';

// ========== АУТЕНТИФИКАЦИЯ ==========
async function register() {
    const username = document.getElementById('regUsername').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const res = await fetch(API + 'register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, email, password})
    });
    const data = await res.json();
    alert(data.success ? 'Регистрация успешна!' : data.error);
}

async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const res = await fetch(API + 'login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (data.success) {
        token = data.token;
        localStorage.setItem('token', token);
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        document.getElementById('navUsername').innerText = data.username;
        loadAll();
    } else {
        alert('Ошибка входа: ' + data.error);
    }
}

function logout() {
    localStorage.removeItem('token');
    location.reload();
}

// ========== HELPER ==========
async function authFetch(route, options = {}) {
    const res = await fetch(API + route, {
        ...options,
        headers: {'Content-Type': 'application/json', 'Authorization': token, ...options.headers}
    });
    if (res.status === 401) logout();
    return res;
}

// ========== ПОСТЫ ==========
async function createPost() {
    const title = document.getElementById('postTitle').value;
    const content = document.getElementById('postContent').value;
    const tags = document.getElementById('postTags').value.split(',').map(t => t.trim()).filter(t => t);
    const visibility = document.getElementById('postVisibility').value;
    if (!title || !content) return alert('Заполните заголовок и содержание');
    
    const res = await authFetch('posts', { method: 'POST', body: JSON.stringify({title, content, tags, visibility}) });
    if (res.ok) {
        alert('Пост создан');
        document.getElementById('postTitle').value = '';
        document.getElementById('postContent').value = '';
        document.getElementById('postTags').value = '';
        loadAll();
    }
}

async function loadMyPosts() {
    const res = await authFetch('my-posts');
    const posts = await res.json();
    const container = document.getElementById('myPosts');
    if (!posts.length) { container.innerHTML = '<p>Нет постов</p>'; return; }
    container.innerHTML = posts.map(p => `
        <div class="post">
            <h3>${escape(p.title)}</h3>
            <p>${escape(p.content.substring(0, 150))}...</p>
            <div class="tags">🏷️ ${p.tags?.join(', ') || 'нет'} | 👁️ ${p.visibility}</div>
            <button class="warning" onclick="openEditModal(${p.id}, '${escape(p.title).replace(/'/g, "\\'")}', '${escape(p.content).replace(/'/g, "\\'")}')">✏️ Ред.</button>
            <button class="danger" onclick="deletePost(${p.id})">🗑️ Дел.</button>
            <button onclick="showComments(${p.id})">💬 Комм.</button>
        </div>
    `).join('');
}

function openEditModal(id, title, content) {
    currentEditId = id;
    document.getElementById('editTitle').value = title;
    document.getElementById('editContent').value = content;
    document.getElementById('editModal').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
}

async function saveEdit() {
    const title = document.getElementById('editTitle').value;
    const content = document.getElementById('editContent').value;
    const res = await authFetch(`posts/${currentEditId}`, { method: 'PUT', body: JSON.stringify({title, content}) });
    if (res.ok) { alert('Обновлено'); loadAll(); closeEditModal(); }
}

async function deletePost(id) {
    if (!confirm('Удалить пост?')) return;
    await authFetch(`posts/${id}`, { method: 'DELETE' });
    loadAll();
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
}

// ========== ЛЕНТА ==========
async function loadFeed() {
    const res = await authFetch('feed');
    const posts = await res.json();
    const container = document.getElementById('feed');
    if (!posts.length) { container.innerHTML = '<p>Подпишитесь на кого-нибудь</p>'; return; }
    container.innerHTML = posts.map(p => `
        <div class="post"><h3>${escape(p.title)}</h3><p><strong>${escape(p.username)}</strong></p><p>${escape(p.content)}</p><div class="tags">🏷️ ${p.tags?.join(', ') || ''}</div><button onclick="showComments(${p.id})">💬</button></div>
    `).join('');
}

// ========== ПУБЛИЧНЫЕ ПОСТЫ ==========
async function loadPublicPosts(tag = '') {
    let url = 'public-posts';
    if (tag) url += '&tag=' + encodeURIComponent(tag);
    const res = await fetch(API + url);
    const posts = await res.json();
    const container = document.getElementById('publicPosts');
    if (!posts.length) { container.innerHTML = '<p>Нет публичных постов</p>'; return; }
    container.innerHTML = posts.map(p => `
        <div class="post"><h3>${escape(p.title)}</h3><p>✍️ ${escape(p.username)}</p><p>${escape(p.content)}</p><div class="tags">🏷️ ${p.tags?.join(', ') || ''}</div><button onclick="subscribe(${p.author_id})">➕ Подписаться</button><button onclick="showComments(${p.id})">💬</button></div>
    `).join('');
}

function filterByTag() {
    const tag = document.getElementById('tagFilter').value.trim();
    loadPublicPosts(tag);
}

// ========== ПОДПИСКИ ==========
async function subscribe(userId) {
    await authFetch(`subscribe/${userId}`, { method: 'POST' });
    alert('Подписка оформлена');
}

// ========== СКРЫТЫЕ ПОСТЫ ==========
async function loadRequestPosts() {
    const res = await authFetch('accessible-request-posts');
    const posts = await res.json();
    const container = document.getElementById('requestPosts');
    if (!posts.length) { container.innerHTML = '<p>Нет доступных скрытых постов</p>'; return; }
    container.innerHTML = posts.map(p => `
        <div class="post"><h3>${escape(p.title)}</h3><p>✍️ ${escape(p.username)}</p><p>${escape(p.content)}</p><div class="tags">🔐 Только по запросу</div><button onclick="showComments(${p.id})">💬</button></div>
    `).join('');
}

// ========== КОММЕНТАРИИ ==========
async function showComments(postId) {
    const text = prompt('Ваш комментарий:');
    if (!text) return;
    const res = await authFetch(`comments/${postId}`, { method: 'POST', body: JSON.stringify({text}) });
    if (res.ok) {
        alert('Комментарий добавлен');
        const comments = await (await fetch(API + `comments/${postId}`)).json();
        alert('Комментарии:\n' + comments.map(c => `${c.username}: ${c.text}`).join('\n'));
    }
}

// ========== ЗАГРУЗКА ВСЕГО ==========
async function loadAll() {
    await loadMyPosts();
    await loadFeed();
    await loadPublicPosts();
    await loadRequestPosts();
}

function escape(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

if (token) {
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('dashboardSection').style.display = 'block';
    loadAll();
    fetch(API + 'login?check').then(async r => {
        if (r.status === 401) logout();
        else {
            const profile = await r.json();
            document.getElementById('navUsername').innerText = profile?.username || '';
        }
    }).catch(() => logout());
} else {
    document.getElementById('authSection').style.display = 'block';
    document.getElementById('dashboardSection').style.display = 'none';
}
</script>
</body>
</html>
